<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 物流智能分析系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a1a;
            font-family: 'Inter', sans-serif;
        }
        .auth-container {
            background: rgba(20, 25, 45, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(100, 130, 200, 0.3);
            border-radius: 16px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 0.5rem;
        }
        .auth-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(100, 140, 220, 0.4);
            border-radius: 8px;
            font-size: 1rem;
            color: white;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .form-group input:focus {
            outline: none;
            border-color: rgba(14, 165, 233, 0.6);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }
        .error-message {
            background: rgba(239, 68, 68, 0.2);
            color: #ff6b6b;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .btn-auth {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, rgba(30, 120, 200, 0.8), rgba(40, 140, 100, 0.8));
            color: white;
            border: 1px solid rgba(100, 180, 255, 0.5);
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-auth:hover {
            background: linear-gradient(135deg, rgba(40, 140, 220, 0.9), rgba(50, 160, 120, 0.9));
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(14, 165, 233, 0.3);
        }
        .btn-auth:active {
            transform: translateY(0);
        }
        .admin-hint {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(100, 130, 200, 0.2);
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }
        .admin-hint code {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-family: monospace;
            color: rgba(255, 255, 255, 0.8);
        }
        .auth-hint {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }
        .auth-hint a {
            color: #0ea5e9;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-hint a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>物流智能分析系统</h1>
            <p>请登录以继续</p>
        </div>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-auth">登 录</button>
        </form>

        <div class="admin-hint">
            管理员账号: <code>admin</code> / <code>admin123</code>
        </div>
        <div class="auth-hint">
            没有账号？<a href="/register">立即注册</a>
        </div>
    </div>
</body>
</html>
