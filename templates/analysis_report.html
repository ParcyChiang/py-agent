<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营分析报告 - 物流智能分析</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat_history.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="user-header">
        <span class="user-info"><span id="currentUser"></span></span>
        <a class="btn-logout" href="/logout">退出</a>
    </div>
    <script src="{{ url_for('static', filename='js/liquid-glass.js') }}"></script>
    <script src="{{ url_for('static', filename='js/user_header.js') }}"></script>
    <div class="container">
        <header>
            <h1>运营分析报告</h1>
            <p>获取AI生成的面向执行的洞察与行动清单。</p>
        </header>

        <nav class="nav">
            <a href="/">首页</a>
            <a class="secondary" href="/page/upload">物流数据</a>
            <a class="secondary" href="/page/analyze">运营分析</a>
            <a class="secondary" href="/page/report">日报中心</a>
            <a class="secondary" href="/page/analysis_report">运营报告</a>
            <a class="secondary" href="/page/new_dashboard">实时监控</a>
            <a class="secondary" href="/page/code_generator">代码生成器</a>
            <a class="secondary" href="/page/compare">物流对比</a>
        </nav>

        <div class="analysis-section">
            <button id="genAnalysisBtn">生成AI分析报告</button>
            <button id="genDailyReportBtn">生成每日运营报告</button>
            <div class="results">
                <div class="report-card">
                    <h3>AI分析报告</h3>
                    <div id="analysisContent">点击按钮生成</div>
                </div>
                <div class="report-card">
                    <h3>每日运营报告</h3>
                    <div id="dailyReportContent">点击按钮生成</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='js/cache.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pages/analysis_report.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chat_history.js') }}"></script>
    <script>
    // 页面加载时检查是否有需要恢复的对话
    $(function() {
        const chatData = sessionStorage.getItem('chat_to_load');
        if (chatData) {
            sessionStorage.removeItem('chat_to_load');
            try {
                const chat = JSON.parse(chatData);
                if (chat.page === 'analysis_report') {
                    if (chat.title && chat.title.includes('日报')) {
                        $('#dailyReportContent').html(chat.ai_response || '');
                    } else {
                        $('#analysisContent').html(chat.ai_response || '');
                    }
                }
            } catch (e) {
                console.error('恢复对话数据失败:', e);
            }
        }
    });

    // 初始化对话历史管理器
    window.chatHistoryManager = new ChatHistoryManager({
        page: 'analysis_report',
        onLoadChat: null  // 点击历史记录会跳转到对应页面
    });
    </script>
</body>
</html>
