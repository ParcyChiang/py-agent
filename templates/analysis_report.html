<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营分析报告 - 物流智能分析</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="user-header">
        <span class="user-info"><span id="currentUser"></span></span>
        <a class="btn-logout" href="/logout">退出</a>
    </div>
    <script src="{{ url_for('static', filename='liquid-glass.js') }}"></script>
    <script src="{{ url_for('static', filename='user_header.js') }}"></script>
    <div class="container">
        <header>
            <h1>运营分析报告</h1>
            <p>获取AI生成的面向执行的洞察与行动清单。</p>
        </header>

        <nav class="nav">
            <a href="/">首页</a>
            <a class="secondary" href="/page/upload">数据导入</a>
            <a class="secondary" href="/page/analyze">运营分析</a>
            <a class="secondary" href="/page/shipments">数据列表</a>
            <a class="secondary" href="/page/report">日报中心</a>
            <a class="secondary" href="/page/analysis_report">运营报告</a>
            <a class="secondary" href="/page/new_dashboard">实时监控</a>
            <a class="secondary" href="/page/code_generator">代码生成器</a>
            <a class="secondary" href="/page/compare">物流对比</a>
        </nav>

        <div class="analysis-section">
            <button id="genReportBtn">生成分析报告</button>
            <div class="results">
                <div class="report-card">
                    <h3>AI分析报告</h3>
                    <div id="analysisContent">点击按钮生成</div>
                </div>
                <div class="report-card">
                    <h3>每日运营报告</h3>
                    <div id="dailyReportContent">点击按钮生成</div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='cache.js') }}"></script>
    <script>
        $(function(){
            // 页面加载时从缓存恢复数据
            const savedReport = cacheGet('analysis_report_data');
            if (savedReport) {
                $('#analysisContent').html(savedReport.analysisContent);
                $('#dailyReportContent').html(savedReport.dailyReportContent);
            }

            $('#genReportBtn').on('click', function() {
                $('#analysisContent').html('分析中，请稍候...');
                $('#dailyReportContent').html('生成报告中...');
                $.getJSON('/analysis_report', function(response) {
                    if (response.success) {
                        $('#analysisContent').html(response.analysis);
                        $('#dailyReportContent').html(response.daily_report);
                        cacheSet('analysis_report_data', {
                            analysisContent: response.analysis,
                            dailyReportContent: response.daily_report
                        });
                    } else {
                        $('#analysisContent').html('<div class="error">'+response.message+'</div>');
                    }
                }).fail(function(){
                    $('#analysisContent').html('<div class="error">生成失败，请重试</div>');
                });
            });
        });
    </script>
</body>
</html>
