<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时监控仪表板 - 物流智能分析</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>实时监控仪表板</h1>
            <p>实时监控物流运营状态和关键指标，助力业务决策</p>
        </header>

        <nav class="nav">
            <a href="/">首页</a>
            <a class="secondary" href="/page/upload">数据导入</a>
            <a class="secondary" href="/page/analyze">运营分析</a>
            <a class="secondary" href="/page/shipments">数据列表</a>
            <a class="secondary" href="/page/report">日报中心</a>
            <a class="secondary" href="/page/dashboard">实时监控</a>
            <a class="secondary" href="/page/code_generator">代码生成器</a>
            <a class="secondary" href="/page/compare">物流对比</a>
            <a class="secondary" href="/page/admin_log">日志中心</a>
        </nav>

        <div class="auto-refresh">
            <span id="refreshStatus">自动刷新: 开启</span>
            <button id="toggleRefresh">关闭</button>
        </div>

        <div class="dashboard-grid">
            <div class="metric-card">
                <div class="metric-header">
                    <div class="metric-label">总发货量</div>
                    <div class="metric-icon" style="background-color: #E6F7FF; color: #165DFF;">📦</div>
                </div>
                <div class="metric-value" id="totalShipments">-</div>
<!--                <div class="metric-trend trend-up">-->
<!--                    <span>↑</span>-->
<!--                    <span>今日 +12%</span>-->
<!--                </div>-->
            </div>
            <div class="metric-card">
                <div class="metric-header">
                    <div class="metric-label">总交付量</div>
                    <div class="metric-icon" style="background-color: #F6FFED; color: #52C41A;">✅</div>
                </div>
                <div class="metric-value" id="deliveredAll">-</div>
<!--                <div class="metric-trend trend-up">-->
<!--                    <span>↑</span>-->
<!--                    <span>今日 +8%</span>-->
<!--                </div>-->
            </div>
            <div class="metric-card">
                <div class="metric-header">
                    <div class="metric-label">运输中</div>
                    <div class="metric-icon" style="background-color: #FFF7E6; color: #FFA940;">🚚</div>
                </div>
                <div class="metric-value" id="inTransit">-</div>
<!--                <div class="metric-trend trend-down">-->
<!--                    <span>↓</span>-->
<!--                    <span>今日 -5%</span>-->
<!--                </div>-->
            </div>
            <div class="metric-card">
                <div class="metric-header">
                    <div class="metric-label">今日交付</div>
                    <div class="metric-icon" style="background-color: #F9F0FF; color: #722ED1;">🎉</div>
                </div>
                <div class="metric-value" id="deliveredToday">-</div>
<!--                <div class="metric-trend trend-up">-->
<!--                    <span>↑</span>-->
<!--                    <span>较昨日 +15%</span>-->
<!--                </div>-->
            </div>
            <div class="metric-card">
                <div class="metric-header">
                    <div class="metric-label">交付率</div>
                    <div class="metric-icon" style="background-color: #FFF2F0; color: #FF4D4F;">📊</div>
                </div>
                <div class="metric-value" id="deliveryRate">-</div>
<!--                <div class="metric-trend trend-up">-->
<!--                    <span>↑</span>-->
<!--                    <span>较昨日 +2%</span>-->
<!--                </div>-->
            </div>
        </div>

        <div class="charts-section">
            <div class="chart-container">
                <h3>实时状态分布</h3>
                <canvas id="realtimeStatusChart" width="400" height="200"></canvas>
            </div>
            <div class="chart-container square-chart-container">
                <h3>每日趋势分析</h3>
                <div class="square-chart-wrapper">
                    <canvas id="dailyTrendChart"></canvas>
                </div>
            </div>
        </div>

        <div class="three-d-charts">
            <div class="three-d-chart">
                <h3>实时三维曲面图</h3>
                <img id="realtimeSurface3D" class="chart-image" alt="实时三维曲面图">
            </div>
            
            <div class="three-d-chart">
                <h3>实时三维散点图</h3>
                <img id="realtimeScatter3D" class="chart-image" alt="实时三维散点图">
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let realtimeStatusChart;
        let dailyTrendChart;
        let autoRefreshInterval;
        let isAutoRefresh = true;
        
        // 创建实时状态分布图表
        function createRealtimeStatusChart(statusData) {
            const ctx = document.getElementById('realtimeStatusChart').getContext('2d');
            if (realtimeStatusChart) realtimeStatusChart.destroy();
            
            // 映射中文状态到友好的显示名称
            const statusLabels = {
                'delivered': '已交付',
                'in_transit': '运输中',
                'pending': '待处理',
                'delayed': '延迟',
                '已交付': '已交付',
                '运输中': '运输中',
                '待处理': '待处理',
                '延迟': '延迟'
            };
            
            // 处理状态数据，确保所有状态都有值
            const processedData = {
                '已交付': statusData['delivered'] || statusData['已交付'] || 0,
                '运输中': statusData['in_transit'] || statusData['运输中'] || 0,
                '待处理': statusData['pending'] || statusData['待处理'] || 0,
                '延迟': statusData['delayed'] || statusData['延迟'] || 0
            };
            
            // 过滤掉值为0的状态
            const filteredLabels = Object.keys(processedData).filter(key => processedData[key] > 0);
            const filteredValues = filteredLabels.map(key => processedData[key]);
            
            realtimeStatusChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: filteredLabels,
                    datasets: [{
                        data: filteredValues,
                        backgroundColor: [
                            '#00B42A',  // 已交付 - 绿色
                            '#FF7D00',  // 运输中 - 橙色
                            '#165DFF',  // 待处理 - 蓝色
                            '#F53F3F'   // 延迟 - 红色
                        ],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    aspectRatio: 1,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: {
                                    size: 13
                                }
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            padding: 12,
                            titleFont: {
                                size: 14
                            },
                            bodyFont: {
                                size: 13
                            },
                            cornerRadius: 8
                        }
                    },
                    cutout: '70%'
                }
            });
        }
        
        // 创建每日趋势分析图表
        function createDailyTrendChart(dailyTrendData) {
            const ctx = document.getElementById('dailyTrendChart').getContext('2d');
            if (dailyTrendChart) dailyTrendChart.destroy();
            
            console.log('createDailyTrendChart called with data:', dailyTrendData);
            
            // 处理真实数据
            let dates = [];
            let deliveredData = [];
            let inTransitData = [];
            let shipmentsData = [];
            
            try {
                // 创建日期映射表以便快速查找
                const deliveredMap = {};
                const inTransitMap = {};
                const shipmentsMap = {};
                
                // 填充映射表
                if (dailyTrendData && dailyTrendData.delivered) {
                    dailyTrendData.delivered.forEach(item => {
                        deliveredMap[item.date] = item.delivered;
                    });
                }
                
                if (dailyTrendData && dailyTrendData.in_transit) {
                    dailyTrendData.in_transit.forEach(item => {
                        inTransitMap[item.date] = item.in_transit;
                    });
                }
                
                if (dailyTrendData && dailyTrendData.shipments) {
                    dailyTrendData.shipments.forEach(item => {
                        shipmentsMap[item.date] = item.shipments;
                        dates.push(item.date); // 以发货量的日期作为基准
                    });
                }
                
                // 使用模拟数据作为后备
                if (dates.length === 0) {
                    console.log('Using mock data for daily trend chart');
                    const mockDates = ['1月1日', '1月2日', '1月3日', '1月4日', '1月5日', '1月6日', '1月7日'];
                    mockDates.forEach(date => {
                        dates.push(date);
                        deliveredMap[date] = Math.floor(Math.random() * 500) + 100;
                        inTransitMap[date] = Math.floor(Math.random() * 400) + 150;
                        shipmentsMap[date] = Math.floor(Math.random() * 600) + 200;
                    });
                }
                
                // 按日期排序
                dates.sort();
                
                // 填充数据数组
                dates.forEach(date => {
                    deliveredData.push(deliveredMap[date] || 0);
                    inTransitData.push(inTransitMap[date] || 0);
                    shipmentsData.push(shipmentsMap[date] || 0);
                });
                
                // 格式化日期显示为年月日
                const formattedDates = dates.map(date => {
                    // 检查日期格式，如果是ISO格式（如2025-12-25）则直接使用
                    if (/^\d{4}-\d{2}-\d{2}$/.test(date)) {
                        return date;
                    }
                    // 否则尝试解析并格式化
                    const d = new Date(date);
                    if (!isNaN(d.getTime())) {
                        const year = d.getFullYear();
                        const month = String(d.getMonth() + 1).padStart(2, '0');
                        const day = String(d.getDate()).padStart(2, '0');
                        return `${year}-${month}-${day}`;
                    }
                    // 如果无法解析，保留原始日期
                    return date;
                });
                
                // 计算y轴最大值（找到所有数据点的最大值，然后向上取整到合适的值）
                const allData = [...deliveredData, ...inTransitData, ...shipmentsData];
                const maxValue = Math.max(...allData);
                // 找到最高拐点后，向上取整到合适的数值（如100的倍数）
                const yMax = Math.ceil(maxValue / 100) * 100;
                
                console.log('Processing data - dates:', dates);
                console.log('Formatted dates:', formattedDates);
                console.log('Delivered data:', deliveredData);
                console.log('In transit data:', inTransitData);
                console.log('Shipments data:', shipmentsData);
                console.log('Calculated yMax:', yMax);
                
                dailyTrendChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: formattedDates,
                        datasets: [{
                            label: '交付量',
                            data: deliveredData,
                            borderColor: '#00B42A',
                            backgroundColor: 'rgba(0, 180, 42, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4
                        }, {
                            label: '运输中',
                            data: inTransitData,
                            borderColor: '#FF7D00',
                            backgroundColor: 'rgba(255, 125, 0, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4
                        }, {
                            label: '发货量',
                            data: shipmentsData,
                            borderColor: '#165DFF',
                            backgroundColor: 'rgba(22, 93, 255, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        aspectRatio: 1,
                        plugins: {
                            legend: {
                                position: 'top'
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: yMax
                            },
                            x: {
                                // 确保x轴标签显示为年月日格式
                                ticks: {
                                    callback: function(value, index, values) {
                                        return values[index];
                                    }
                                }
                            }
                        }
                    }
                });
                console.log('Chart created successfully');
            } catch (error) {
                console.error('Error creating chart:', error);
            }
        }
        
        // 显示实时三维图表
        function displayRealtime3DCharts(chartData) {
            // 显示实时三维曲面图
            if (chartData.surface_3d) {
                document.getElementById('realtimeSurface3D').src = 'data:image/png;base64,' + chartData.surface_3d;
            } else {
                document.getElementById('realtimeSurface3D').src = '';
                document.getElementById('realtimeSurface3D').alt = '暂无实时三维曲面图数据';
            }
            
            // 显示实时三维散点图
            if (chartData.scatter_3d) {
                document.getElementById('realtimeScatter3D').src = 'data:image/png;base64,' + chartData.scatter_3d;
            } else {
                document.getElementById('realtimeScatter3D').src = '';
                document.getElementById('realtimeScatter3D').alt = '暂无实时三维散点图数据';
            }
        }
        
        // 更新仪表盘数据
        function updateDashboard() {
            $.getJSON('/analyze', function(response) {
                if (response.success) {
                    // 统一数据引用与中英文键兼容
                    const statusDist = response.summary && response.summary.status_distribution ? response.summary.status_distribution : {};
                    const totalRecords = (response.summary && response.summary.total_records) || 0;
                    const totalToday = (response.statistics && response.statistics.total_shipments) || 0; // 今日入库/创建
                    const deliveredToday = (response.statistics && response.statistics.delivered) || 0; // 今日交付
                    const deliveredAll = statusDist['delivered'] || statusDist['已送达'] || 0; // 总交付量
                    const inTransitAll = statusDist['in_transit'] || statusDist['运输中'] || 0; // 运输中（总量）

                    // 更新指标卡片
                    $('#totalShipments').text(totalRecords.toLocaleString());
                    $('#deliveredAll').text(deliveredAll.toLocaleString());
                    $('#deliveredToday').text(deliveredToday.toLocaleString());
                    $('#inTransit').text(inTransitAll.toLocaleString());

                    // 交付率：使用总交付量 / 总发货量
                    const denom = totalRecords > 0 ? totalRecords : 1;
                    const rate = Math.round((deliveredAll / denom) * 100);
                    $('#deliveryRate').text(rate + '%');
                    
                    // 更新图表
                    createRealtimeStatusChart(response.summary.status_distribution);
                    createDailyTrendChart(response.statistics.daily_trend);
                    displayRealtime3DCharts(response.statistics);
                }
            }).fail(function() {
                console.log('数据更新失败');
            });
        }
        
        // 启动自动刷新
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(updateDashboard, 30000); // 30秒刷新一次
        }
        
        // 停止自动刷新
        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }
        
        // 页面加载完成后初始化
        $(function(){
            // 初始加载数据
            updateDashboard();
            
            // 自动刷新控制
            $('#toggleRefresh').on('click', function() {
                isAutoRefresh = !isAutoRefresh;
                if (isAutoRefresh) {
                    startAutoRefresh();
                    $('#refreshStatus').text('自动刷新: 开启');
                    $(this).text('关闭');
                } else {
                    stopAutoRefresh();
                    $('#refreshStatus').text('自动刷新: 关闭');
                    $(this).text('开启');
                }
            });
            
            // 启动自动刷新
            startAutoRefresh();
        });
    </script>
</body>
</html>
