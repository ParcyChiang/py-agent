<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流对比分析 - 物流智能分析</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .comparison-section {
            margin-top: 20px;
            background: rgba(20, 25, 45, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(100, 130, 200, 0.25);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 24px;
        }
        .filter-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            align-items: end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }
        .form-control {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 130, 200, 0.3);
            border-radius: 8px;
            font-size: 14px;
            width: 200px;
            color: rgba(255, 255, 255, 0.95);
            transition: all 0.3s ease;
        }
        .form-control:focus {
            outline: none;
            border-color: rgba(14, 165, 233, 0.6);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15), inset 0 2px 5px rgba(0, 0, 0, 0.1);
            background: rgba(255, 255, 255, 0.15);
        }
        .form-control option {
            background: rgba(20, 25, 45, 0.95);
            color: white;
        }
        .custom-select {
            position: relative;
        }
        .custom-select select {
            display: block;
            margin-bottom: 5px;
        }
        .custom-select input {
            display: block;
        }
        .input-with-clear {
            position: relative;
        }
        .input-with-clear .form-control {
            padding-right: 30px;
        }
        .clear-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
            display: none;
        }
        .clear-btn.show {
            display: block;
        }
        .clear-btn:hover {
            color: rgba(255, 255, 255, 0.9);
        }
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(20, 25, 45, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(100, 130, 200, 0.3);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        .dropdown-menu.show {
            display: block;
        }
        .dropdown-item {
            padding: 10px 14px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.9);
            transition: background 0.2s ease;
        }
        .dropdown-item:hover {
            background: rgba(100, 130, 200, 0.3);
        }
        .address-group {
            background: rgba(20, 25, 45, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(100, 130, 200, 0.25);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        .address-group:hover {
            border-color: rgba(120, 160, 230, 0.4);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        .address-group h3 {
            margin-top: 0;
            color: white;
            font-size: 18px;
            border-bottom: 1px solid rgba(100, 130, 200, 0.2);
            padding-bottom: 12px;
            margin-bottom: 16px;
        }
        .group-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 15px;
        }
        .info-item {
            flex: 1;
            min-width: 150px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(100, 130, 200, 0.15);
        }
        .info-item strong {
            display: block;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-item span {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }
        .address-group h4 {
            color: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            margin: 16px 0 10px;
        }
        .status-distribution, .courier-distribution {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        .status-distribution span, .courier-distribution span {
            background: rgba(100, 130, 200, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(100, 130, 200, 0.3);
        }
        .shipments-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
        }
        .shipments-table th,
        .shipments-table td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid rgba(100, 130, 200, 0.15);
            color: rgba(255, 255, 255, 0.9);
        }
        .shipments-table th {
            background: rgba(100, 130, 200, 0.15);
            font-weight: 600;
            color: rgba(255, 255, 255, 1);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .shipments-table tr:hover td {
            background: rgba(100, 130, 200, 0.1);
        }
        .analyze-btn {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.8), rgba(50, 150, 70, 0.8));
            color: white;
            border: 1px solid rgba(120, 220, 150, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3);
        }
        .analyze-btn:hover {
            background: linear-gradient(135deg, rgba(85, 190, 90, 0.9), rgba(60, 165, 80, 0.9));
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }
        .analysis-result {
            margin-top: 15px;
            padding: 16px;
            background: rgba(14, 165, 233, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 8px;
            border-left: 4px solid rgba(14, 165, 233, 0.8);
            border: 1px solid rgba(14, 165, 233, 0.3);
        }
        .analysis-result h4 {
            margin-top: 0;
            color: rgba(14, 165, 233, 1);
            font-size: 15px;
        }
        .analysis-result .markdown-body {
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            line-height: 1.6;
        }
        .analysis-result .markdown-body h1,
        .analysis-result .markdown-body h2,
        .analysis-result .markdown-body h3,
        .analysis-result .markdown-body h4 {
            color: rgba(255, 255, 255, 1);
            margin-top: 16px;
            margin-bottom: 8px;
        }
        .analysis-result .markdown-body h1 { font-size: 18px; }
        .analysis-result .markdown-body h2 { font-size: 16px; }
        .analysis-result .markdown-body h3 { font-size: 15px; }
        .analysis-result .markdown-body p {
            margin: 8px 0;
        }
        .analysis-result .markdown-body ul,
        .analysis-result .markdown-body ol {
            margin: 8px 0;
            padding-left: 20px;
        }
        .analysis-result .markdown-body li {
            margin: 4px 0;
        }
        .analysis-result .markdown-body code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .analysis-result .markdown-body pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .analysis-result .markdown-body pre code {
            background: none;
            padding: 0;
        }
        .analysis-result .markdown-body strong {
            color: rgba(14, 165, 233, 1);
        }
        .analysis-result .markdown-body blockquote {
            border-left: 3px solid rgba(14, 165, 233, 0.6);
            margin: 10px 0;
            padding-left: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .pagination-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .pagination {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
            gap: 8px;
        }
        .pagination li {
            margin: 0;
        }
        .pagination a {
            display: block;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 130, 200, 0.3);
            border-radius: 8px;
            text-decoration: none;
            color: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }
        .pagination a:hover {
            background: rgba(100, 130, 200, 0.3);
            border-color: rgba(120, 160, 230, 0.5);
            transform: translateY(-2px);
        }
        .pagination .active a {
            background: linear-gradient(135deg, rgba(30, 144, 255, 0.9), rgba(20, 100, 200, 0.9));
            color: white;
            border-color: rgba(100, 170, 255, 0.6);
            box-shadow: 0 4px 15px rgba(30, 144, 255, 0.4);
        }
        .pagination .disabled a {
            color: rgba(255, 255, 255, 0.4);
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(100, 130, 200, 0.15);
        }
        .pagination .disabled a:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: none;
        }
        #comparisonResult {
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            padding: 40px 20px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px dashed rgba(100, 130, 200, 0.3);
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="user-header">
        <span class="user-info"><span id="currentUser"></span></span>
        <a class="btn-logout" href="/logout">退出</a>
    </div>
    <script src="{{ url_for('static', filename='js/liquid-glass.js') }}"></script>
    <script src="{{ url_for('static', filename='js/user_header.js') }}"></script>
    <div class="container">
        <header>
            <h1>物流对比分析</h1>
            <p>对比同一收件地址或发件地址的物流信息，并获取智能优化方案。</p>
        </header>

        <nav class="nav">
            <a href="/">首页</a>
            <a class="secondary" href="/page/upload">物流数据</a>
            <a class="secondary" href="/page/analyze">运营分析</a>
            <a class="secondary" href="/page/report">日报中心</a>
            <a class="secondary" href="/page/analysis_report">运营报告</a>
            <a class="secondary" href="/page/new_dashboard">实时监控</a>
            <a class="secondary" href="/page/code_generator">代码生成器</a>
            <a class="secondary" href="/page/compare">物流对比</a>
        </nav>

        <div class="comparison-section">
            <div class="filter-controls">
                <div class="form-group">
                    <label for="originFilter">发件地址过滤：</label>
                    <div class="custom-select input-with-clear">
                        <input type="text" id="originFilter" class="form-control" placeholder="输入或选择发件地址">
                        <span class="clear-btn" data-target="originFilter">&times;</span>
                        <div id="originDropdown" class="dropdown-menu"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="destinationFilter">收件地址过滤：</label>
                    <div class="custom-select input-with-clear">
                        <input type="text" id="destinationFilter" class="form-control" placeholder="输入或选择收件地址">
                        <span class="clear-btn" data-target="destinationFilter">&times;</span>
                        <div id="destinationDropdown" class="dropdown-menu"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="courierFilter">快递公司过滤：</label>
                    <div class="custom-select input-with-clear">
                        <input type="text" id="courierFilter" class="form-control" placeholder="输入或选择快递公司">
                        <span class="clear-btn" data-target="courierFilter">&times;</span>
                        <div id="courierDropdown" class="dropdown-menu"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="pageSize">每页数量：</label>
                    <select id="pageSize" class="form-control">
                        <option value="10">10</option>
                        <option value="20" selected>20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>
            <div id="comparisonResult"></div>
            <div class="pagination-container" id="pagination"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/cache.js') }}"></script>
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pages/compare.js') }}"></script>
</body>
</html>
