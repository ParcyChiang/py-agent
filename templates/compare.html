<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流对比分析 - 物流智能分析</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat_history.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/compare.css') }}">
</head>
<body>
    <div class="user-header">
        <span class="user-info"><span id="currentUser"></span></span>
        <a class="btn-logout" href="/logout">退出</a>
    </div>
    <script src="{{ url_for('static', filename='js/liquid-glass.js') }}"></script>
    <script src="{{ url_for('static', filename='js/user_header.js') }}"></script>
    <div class="container">
        <header>
            <h1>物流对比分析</h1>
            <p>对比同一收件地址或发件地址的物流信息，并获取智能优化方案。</p>
        </header>

        <nav class="nav">
            <a href="/">首页</a>
            <a class="secondary" href="/page/upload">物流数据</a>
            <a class="secondary" href="/page/analyze">运营分析</a>
            <a class="secondary" href="/page/report">日报中心</a>
            <a class="secondary" href="/page/analysis_report">运营报告</a>
            <a class="secondary" href="/page/new_dashboard">实时监控</a>
            <a class="secondary" href="/page/code_generator">代码生成器</a>
            <a class="secondary" href="/page/compare">物流对比</a>
        </nav>

        <div class="comparison-section">
            <div class="filter-controls">
                <div class="form-group">
                    <label for="originFilter">发件地址过滤：</label>
                    <div class="custom-select input-with-clear">
                        <input type="text" id="originFilter" class="form-control" placeholder="输入或选择发件地址">
                        <span class="clear-btn" data-target="originFilter">&times;</span>
                        <div id="originDropdown" class="dropdown-menu"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="destinationFilter">收件地址过滤：</label>
                    <div class="custom-select input-with-clear">
                        <input type="text" id="destinationFilter" class="form-control" placeholder="输入或选择收件地址">
                        <span class="clear-btn" data-target="destinationFilter">&times;</span>
                        <div id="destinationDropdown" class="dropdown-menu"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="courierFilter">快递公司过滤：</label>
                    <div class="custom-select input-with-clear">
                        <input type="text" id="courierFilter" class="form-control" placeholder="输入或选择快递公司">
                        <span class="clear-btn" data-target="courierFilter">&times;</span>
                        <div id="courierDropdown" class="dropdown-menu"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="pageSize">每页数量：</label>
                    <select id="pageSize" class="form-control">
                        <option value="10">10</option>
                        <option value="20" selected>20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                    </select>
                </div>
            </div>
            <div id="comparisonResult"></div>
            <div class="pagination-container" id="pagination"></div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/cache.js') }}"></script>
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pages/compare.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chat_history.js') }}"></script>
    <script>
    // 页面加载时检查是否有需要恢复的对话
    $(function() {
        const chatData = sessionStorage.getItem('chat_to_load');
        if (chatData) {
            sessionStorage.removeItem('chat_to_load');
            try {
                const chat = JSON.parse(chatData);
                if (chat.page === 'compare' && chat.ai_response) {
                    // 物流对比页面的分析结果恢复
                    var markdownContent = marked.parse(chat.ai_response);
                    // 可以根据需要显示到对应位置
                }
            } catch (e) {
                console.error('恢复对话数据失败:', e);
            }
        }
    });

    // 初始化对话历史管理器
    window.chatHistoryManager = new ChatHistoryManager({
        page: 'compare',
        onLoadChat: null  // 点击历史记录会跳转到对应页面
    });
    </script>
</body>
</html>
