<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python代码生成器 - 物流分析系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="user-header">
        <span class="user-info"><span id="currentUser"></span></span>
        <a class="btn-logout" href="/logout">退出</a>
    </div>
    <script src="{{ url_for('static', filename='js/liquid-glass.js') }}"></script>
    <script src="{{ url_for('static', filename='js/user_header.js') }}"></script>
    <div class="container">
        <header>
            <h1>Python代码生成器</h1>
            <p>使用AI生成Python代码来分析物流数据</p>
        </header>

        <nav class="nav">
            <a href="/">首页</a>
            <a class="secondary" href="/page/upload">物流数据</a>
            <a class="secondary" href="/page/analyze">运营分析</a>
            <a class="secondary" href="/page/report">日报中心</a>
            <a class="secondary" href="/page/analysis_report">运营报告</a>
            <a class="secondary" href="/page/new_dashboard">实时监控</a>
            <a class="secondary" href="/page/code_generator">代码生成器</a>
            <a class="secondary" href="/page/compare">物流对比</a>
        </nav>

        <main>
            <div class="code-container">
                <h3>提问并生成Python代码</h3>
                <p>描述您想要的分析任务，AI将为您生成相应的Python代码：</p>
                
                <textarea 
                    id="questionInput" 
                    class="question-input" 
                    placeholder="例如：分析物流数据中不同城市的配送时间分布，并生成可视化图表..."
                ></textarea>
                
                <div class="example-questions">
                    <h4>示例问题：</h4>
                    <div class="example-question" onclick="setQuestion('分析物流数据中不同状态的包裹数量分布，并生成饼图')">
                        分析物流数据中不同状态的包裹数量分布，并生成饼图
                    </div>
                    <div class="example-question" onclick="setQuestion('计算每个城市的平均配送时间，并找出配送时间最长的前5个城市')">
                        计算每个城市的平均配送时间，并找出配送时间最长的前5个城市
                    </div>
                    <div class="example-question" onclick="setQuestion('分析不同快递公司的配送效率，比较它们的平均配送时间和成功率')">
                        分析不同快递公司的配送效率，比较它们的平均配送时间和成功率
                    </div>
                    <div class="example-question" onclick="setQuestion('生成物流数据的月度趋势分析，包括发货量、配送时间等关键指标')">
                        生成物流数据的月度趋势分析，包括发货量、配送时间等关键指标
                    </div>
                </div>
                
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="generateCode()">
                        生成Python代码
                    </button>
                    <button class="btn btn-success" onclick="executeCode()" id="executeBtn" disabled>
                        执行代码
                    </button>
                    <button class="btn btn-danger" onclick="clearAll()">
                        清空
                    </button>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AI正在生成代码，请稍候...</p>
            </div>

            <div class="code-container" id="codeContainer" style="display: none;">
                <h3>生成的Python代码：</h3>
                <div class="code-editor" id="generatedCode"></div>
            </div>

            <div class="code-container" id="outputContainer" style="display: none;">
                <h3>执行结果：</h3>
                <div class="output-container" id="executionOutput"></div>
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="{{ url_for('static', filename='js/cache.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pages/code_generator.js') }}"></script>
</body>
</html>
