<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>运营分析 - 物流智能分析</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="user-header">
        <span class="user-info"><span id="currentUser"></span></span>
        <a class="btn-logout" href="/logout">退出</a>
    </div>
    <script src="{{ url_for('static', filename='js/liquid-glass.js') }}"></script>
    <script src="{{ url_for('static', filename='js/user_header.js') }}"></script>
    <div class="container">
        <header>
            <h1>运营分析</h1>
            <p>查看物流数据的三维可视化图表与分析。</p>
        </header>

        <nav class="nav">
            <a href="/">首页</a>
            <a class="secondary" href="/page/upload">物流数据</a>
            <a class="secondary" href="/page/analyze">运营分析</a>
            <a class="secondary" href="/page/report">日报中心</a>
            <a class="secondary" href="/page/analysis_report">运营报告</a>
            <a class="secondary" href="/page/new_dashboard">实时监控</a>
            <a class="secondary" href="/page/code_generator">代码生成器</a>
            <a class="secondary" href="/page/compare">物流对比</a>
        </nav>

        <div class="analysis-section">
            <button id="analyzeBtn">分析物流数据</button>
            <div class="results">
                <div class="stats-card">
                    <h3>数据概览</h3>
                    <div id="statsContent">请先上传数据</div>
                </div>
                <div class="chart-card">
                    <h3>物流状态分布</h3>
                    <canvas id="statusChart" width="400" height="300"></canvas>
                </div>
                <div class="chart-card">
                    <h3>三维曲面图</h3>
                    <img id="surface3D" style="width: 100%; height: 400px; object-fit: contain;" alt="三维曲面图">
                </div>
                <div class="chart-card">
                    <h3>三维散点图</h3>
                    <img id="scatter3D" style="width: 100%; height: 400px; object-fit: contain;" alt="三维散点图">
                </div>
                <div class="chart-card">
                    <h3>三维线框图</h3>
                    <img id="wireframe3D" style="width: 100%; height: 400px; object-fit: contain;" alt="三维线框图">
                </div>
                <div class="chart-card">
                    <h3>数据信息</h3>
                    <div id="dataInfo" style="height: 300px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/cache.js') }}"></script>
    <script src="{{ url_for('static', filename='js/pages/analyze.js') }}"></script>
</body>
</html>
