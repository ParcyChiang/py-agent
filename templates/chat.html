<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能物流助手 - 物流分析系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: #f5f6fa;
        }
        .chat-wrapper {
            max-width: 900px;
            margin: 0 auto;
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
            background: white;
        }
        .chat-header h3 {
            margin: 0;
            color: #333;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
            min-height: 400px;
        }
        .message {
            margin-bottom: 16px;
            max-width: 80%;
            clear: both;
        }
        .message.user {
            float: right;
        }
        .message.assistant {
            float: left;
        }
        .message::after {
            content: '';
            display: table;
        }
        .message-content {
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: #0d6efd;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-content {
            background: #f1f3f4;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #e0e0e0;
            background: white;
        }
        .chat-input-group {
            display: flex;
            gap: 12px;
        }
        .chat-input {
            flex: 1;
            border-radius: 24px;
            padding: 12px 20px;
            border: 1px solid #ddd;
            font-size: 15px;
        }
        .chat-input:focus {
            outline: none;
            border-color: #0d6efd;
            box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.1);
        }
        .btn-send {
            border-radius: 24px;
            padding: 10px 28px;
            font-weight: 500;
        }
        .welcome-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
        }
        .welcome-box h4 {
            color: #333;
            margin-bottom: 16px;
        }
        .welcome-box p {
            color: #666;
            font-size: 14px;
            margin: 6px 0;
        }
        .executed-badge {
            display: inline-block;
            background: #d4edda;
            color: #155724;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 8px;
        }

        /* 悬浮按钮 */
        .floating-btns {
            position: fixed;
            top: 80px;
            left: 0;
            right: 0;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            pointer-events: none;
        }
        .floating-btns > * {
            pointer-events: auto;
        }
        .floating-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-size: 18px;
            color: #333;
        }
        .floating-btn:hover {
            background: #f0f0f0;
            transform: scale(1.05);
        }

        /* 历史记录模态框 */
        .history-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1050;
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding-top: 60px;
        }
        .history-modal.show {
            display: flex;
        }
        .history-modal-content {
            background: white;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .history-modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .history-modal-header h5 {
            margin: 0;
            font-size: 16px;
        }
        .history-modal-actions {
            display: flex;
            gap: 12px;
        }
        .history-modal-actions button {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            color: #666;
        }
        .history-modal-actions button:hover {
            color: #0d6efd;
        }
        .history-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 0;
        }
        .session-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .session-item:hover {
            background: #f8f9fa;
        }
        .session-item-title {
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .session-item-meta {
            font-size: 12px;
            color: #999;
        }
        .empty-history {
            padding: 40px 20px;
            text-align: center;
            color: #999;
        }
    </style>
</head>
<body>
    <script src="{{ url_for('static', filename='js/liquid-glass.js') }}"></script>
    <div class="user-header">
        <span class="user-info"><span id="currentUser"></span></span>
        <a class="btn-logout" href="/logout">退出</a>
    </div>

    <div class="container">
        <header>
            <h1>智能物流助手</h1>
            <p>AI驱动的物流分析与决策助手</p>
        </header>

        <nav class="nav">
            <div class="nav-links">
                <a href="/">首页</a>
                <a class="secondary" href="/page/upload">物流数据</a>
                <a class="secondary" href="/page/analyze">运营分析</a>
                <a class="secondary" href="/page/report">日报中心</a>
                <a class="secondary" href="/page/analysis_report">运营报告</a>
                <a class="secondary" href="/page/new_dashboard">实时监控</a>
                <a class="secondary" href="/page/code_generator">代码生成器</a>
                <a class="secondary" href="/page/compare">物流对比</a>
            </div>
        </nav>

        <!-- 悬浮按钮 -->
        <div class="floating-btns">
            <button class="floating-btn" onclick="toggleHistory()" title="历史记录">&#9776;</button>
            <button class="floating-btn" onclick="createNewSession()" title="新建对话">+</button>
        </div>

        <div class="chat-wrapper">
            <div class="chat-header">
                <h3>智能物流助手</h3>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="welcome-box" id="welcomeBox">
                    <h4>欢迎使用智能物流助手</h4>
                    <p>您可以：</p>
                    <p>• 查询物流订单 "查一下最近3天的订单"</p>
                    <p>• 修改订单状态 "把延误的改成已送达"</p>
                    <p>• 优化物流线路 "帮我优化下物流"</p>
                    <p>• 了解物流概念 "什么是SLA"</p>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-group">
                    <input type="text" class="form-control chat-input" id="messageInput"
                           placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                    <button class="btn btn-primary btn-send" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 历史记录模态框 -->
    <div class="history-modal" id="historyModal">
        <div class="history-modal-content">
            <div class="history-modal-header">
                <div class="history-modal-actions">
                    <button onclick="createNewSession()" title="新建对话">+</button>
                </div>
                <h5>历史记录</h5>
                <div class="history-modal-actions">
                    <button onclick="closeHistory()" title="关闭">&times;</button>
                </div>
            </div>
            <div class="history-modal-body" id="sessionList"></div>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认操作</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="confirmModalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirmBtn">确认</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Diff 弹窗 -->
    <div class="modal fade" id="diffModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">变更预览</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="diffModalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="diffConfirmBtn">确认执行</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/user_header.js') }}"></script>
    <script>
        let currentSessionId = '{{ session_id if session_id else "" }}';
        let pendingPlan = null;

        document.addEventListener('DOMContentLoaded', function() {
            if (!currentSessionId) {
                const urlParams = new URLSearchParams(window.location.search);
                currentSessionId = urlParams.get('session_id') || '';
            }

            if (currentSessionId) {
                loadHistory();
            }
        });

        function toggleHistory() {
            const modal = document.getElementById('historyModal');
            if (modal.classList.contains('show')) {
                closeHistory();
            } else {
                loadSessionList();
                modal.classList.add('show');
            }
        }

        function closeHistory() {
            document.getElementById('historyModal').classList.remove('show');
        }

        function createNewSession() {
            closeHistory();
            fetch('/api/chat/sessions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title: '新对话'})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    window.location.href = '/page/chat/' + data.data.session_id;
                }
            });
        }

        function loadSessionList() {
            fetch('/api/chat/sessions')
            .then(r => r.json())
            .then(data => {
                const list = document.getElementById('sessionList');
                if (!data.success || data.data.sessions.length === 0) {
                    list.innerHTML = '<div class="empty-history">暂无历史记录</div>';
                    return;
                }
                list.innerHTML = '';
                data.data.sessions.forEach(session => {
                    const div = document.createElement('div');
                    div.className = 'session-item';
                    div.innerHTML = '<div class="session-item-title">' + escapeHtml(session.title || '新对话') + '</div><div class="session-item-meta">' + session.message_count + ' 条消息</div>';
                    div.onclick = () => loadSession(session.session_id);
                    list.appendChild(div);
                });
            });
        }

        function loadSession(sessionId) {
            closeHistory();
            window.location.href = '/page/chat/' + sessionId;
        }

        function loadHistory() {
            if (!currentSessionId) return;

            document.getElementById('welcomeBox').style.display = 'none';

            fetch('/api/chat/history/' + currentSessionId)
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    const container = document.getElementById('chatMessages');
                    if (data.data.messages.length === 0) {
                        document.getElementById('welcomeBox').style.display = 'block';
                        return;
                    }
                    container.innerHTML = '';
                    document.getElementById('welcomeBox').style.display = 'none';
                    data.data.messages.forEach(msg => {
                        addMessage(msg.role, msg.content, msg.action_type, msg.diff_content);
                    });
                    scrollToBottom();
                }
            });
        }

        function addMessage(role, content, actionType, diffContent) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message ' + role;

            let extra = '';
            if (role === 'assistant' && actionType === 'mutation' && diffContent) {
                try {
                    const diff = JSON.parse(diffContent);
                    if (diff.before && diff.after) {
                        extra = '<div class="executed-badge">✓ 已执行变更</div>';
                    }
                } catch(e) {}
            }

            div.innerHTML = '<div class="message-content">' + escapeHtml(content).replace(/\n/g, '<br>') + extra + '</div>';
            container.appendChild(div);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            if (!currentSessionId) {
                createNewSessionForMessage(message);
                return;
            }

            sendMessageReal(message);
            input.value = '';
        }

        function createNewSessionForMessage(message) {
            fetch('/api/chat/sessions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title: message.substring(0, 30)})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    currentSessionId = data.data.session_id;
                    document.getElementById('welcomeBox').style.display = 'none';
                    sendMessageReal(message);
                    document.getElementById('messageInput').value = '';
                }
            });
        }

        function sendMessageReal(message) {
            addMessage('user', message);
            scrollToBottom();

            fetch('/api/chat/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({session_id: currentSessionId, message: message})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    const result = data.data;
                    addMessage('assistant', result.content, result.type);

                    if (result.need_confirm && result.action_plan) {
                        pendingPlan = result.action_plan;
                        showIntentConfirm(result.action_plan);
                    }
                    scrollToBottom();
                } else {
                    addMessage('assistant', '抱歉，处理失败: ' + data.message);
                    scrollToBottom();
                }
            })
            .catch(err => {
                addMessage('assistant', '网络错误，请稍后重试');
                scrollToBottom();
            });
        }

        function showIntentConfirm(plan) {
            const body = document.getElementById('confirmModalBody');
            body.innerHTML = '<p>' + (plan.description || '确认执行此操作？') + '</p><p class="text-muted">将影响 ' + plan.affected_count + ' 条记录</p>';

            document.getElementById('confirmBtn').onclick = () => {
                bootstrap.Modal.getInstance(document.getElementById('confirmModal')).hide();
                confirmIntent();
            };

            new bootstrap.Modal(document.getElementById('confirmModal')).show();
        }

        function confirmIntent() {
            fetch('/api/chat/confirm', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    session_id: currentSessionId,
                    step: 'intent',
                    confirmed: true,
                    plan: pendingPlan
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.data.need_diff_confirm) {
                    showDiffConfirm(data.data.diff);
                } else if (data.success) {
                    addMessage('assistant', data.data.content || '操作完成');
                    loadHistory();
                } else {
                    addMessage('assistant', data.message || '操作已取消');
                }
                scrollToBottom();
            });
        }

        function showDiffConfirm(diff) {
            const before = diff.before || [];
            const after = diff.after || [];

            let tableHtml = '<table class="table table-sm"><thead><tr><th>订单ID</th><th>原状态</th><th>新状态</th></tr></thead><tbody>';

            for (let i = 0; i < before.length; i++) {
                tableHtml += '<tr><td>' + escapeHtml(before[i].id) + '</td><td>' + escapeHtml(before[i].status) + '</td><td class="text-success">' + escapeHtml(after[i]?.status || '') + '</td></tr>';
            }

            tableHtml += '</tbody></table>';

            document.getElementById('diffModalBody').innerHTML = tableHtml;

            document.getElementById('diffConfirmBtn').onclick = () => {
                bootstrap.Modal.getInstance(document.getElementById('diffModal')).hide();
                confirmDiff();
            };

            new bootstrap.Modal(document.getElementById('diffModal')).show();
        }

        function confirmDiff() {
            fetch('/api/chat/confirm', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    session_id: currentSessionId,
                    step: 'diff',
                    confirmed: true,
                    plan: pendingPlan
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    addMessage('assistant', data.data.message || '操作执行成功');
                    pendingPlan = null;
                    loadHistory();
                } else {
                    addMessage('assistant', '操作失败: ' + data.message);
                }
                scrollToBottom();
            });
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
