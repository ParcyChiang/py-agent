<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能物流助手 - 物流分析系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chat_history.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: #f5f6fa;
        }
        .chat-wrapper {
            max-width: 900px;
            margin: 0 auto;
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
            background: white;
        }
        .chat-header h3 {
            margin: 0;
            color: #333;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
            min-height: 400px;
        }
        .message {
            margin-bottom: 16px;
            max-width: 80%;
            clear: both;
        }
        .message.user {
            float: right;
        }
        .message.assistant {
            float: left;
        }
        .message::after {
            content: '';
            display: table;
        }
        .message-content {
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .message.user .message-content {
            background: #0d6efd;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .message-content {
            background: #f1f3f4;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid #e0e0e0;
            background: white;
        }
        .chat-input-group {
            display: flex;
            gap: 12px;
        }
        .chat-input {
            flex: 1;
            border-radius: 24px;
            padding: 12px 20px;
            border: 1px solid #ddd;
            font-size: 15px;
        }
        .chat-input:focus {
            outline: none;
            border-color: #0d6efd;
            box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.1);
        }
        .btn-send {
            border-radius: 24px;
            padding: 10px 28px;
            font-weight: 500;
        }
        .welcome-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
        }
        .welcome-box h4 {
            color: #333;
            margin-bottom: 16px;
        }
        .welcome-box p {
            color: #666;
            font-size: 14px;
            margin: 6px 0;
        }
        .executed-badge {
            display: inline-block;
            background: #d4edda;
            color: #155724;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 8px;
        }
        .no-session-selected {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        /* 会话列表项 */
        .session-list-item {
            padding: 14px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
        }
        .session-list-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-left-color: rgba(100, 140, 220, 0.5);
        }
        .session-list-item.active {
            background: rgba(14, 165, 233, 0.15);
            border-left-color: rgba(14, 165, 233, 0.8);
        }
        .session-item-title {
            color: white;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .session-item-meta {
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
        }
        .empty-sessions {
            padding: 40px 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <script src="{{ url_for('static', filename='js/liquid-glass.js') }}"></script>
    <div class="user-header">
        <span class="user-info"><span id="currentUser"></span></span>
        <a class="btn-logout" href="/logout">退出</a>
    </div>

    <div class="container">
        <header>
            <h1>智能物流助手</h1>
            <p>AI驱动的物流分析与决策助手</p>
        </header>

        <nav class="nav">
            <div class="nav-links">
                <a href="/">首页</a>
                <a class="secondary" href="/page/upload">物流数据</a>
                <a class="secondary" href="/page/analyze">运营分析</a>
                <a class="secondary" href="/page/report">日报中心</a>
                <a class="secondary" href="/page/analysis_report">运营报告</a>
                <a class="secondary" href="/page/new_dashboard">实时监控</a>
                <a class="secondary" href="/page/code_generator">代码生成器</a>
                <a class="secondary" href="/page/compare">物流对比</a>
            </div>
        </nav>

        <div class="chat-wrapper">
            <div class="chat-header">
                <h3 id="chatTitle">智能物流助手</h3>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="welcome-box" id="welcomeBox">
                    <h4>欢迎使用智能物流助手</h4>
                    <p>您可以：</p>
                    <p>• 查询物流订单 "查一下最近3天的订单"</p>
                    <p>• 修改订单状态 "把延误的改成已送达"</p>
                    <p>• 优化物流线路 "帮我优化下物流"</p>
                    <p>• 了解物流概念 "什么是SLA"</p>
                </div>
                <div class="no-session-selected" id="noSessionMsg" style="display:none;">
                    请从左侧选择历史会话或发送消息开始新对话
                </div>
            </div>

            <div class="chat-input-area">
                <div class="chat-input-group">
                    <input type="text" class="form-control chat-input" id="messageInput"
                           placeholder="输入消息..." onkeypress="handleKeyPress(event)">
                    <button class="btn btn-primary btn-send" onclick="sendMessage()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="modal fade" id="confirmModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">确认操作</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="confirmModalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirmBtn">确认</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Diff 弹窗 -->
    <div class="modal fade" id="diffModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">变更预览</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="diffModalBody"></div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="diffConfirmBtn">确认执行</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/user_header.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chat_history.js') }}"></script>
    <script>
        let currentSessionId = null;
        let currentChat = null;  // 当前选中的聊天记录
        let pendingPlan = null;

        const pageNames = {
            'chat_agent': '智能助手',
            'code_generator': '代码生成',
            'report': '日报中心',
            'analysis_report': '运营报告',
            'compare': '物流对比'
        };

        // 初始化对话历史管理器
        let chatHistoryManager;
        document.addEventListener('DOMContentLoaded', function() {
            chatHistoryManager = new ChatHistoryManager({
                page: 'chat_agent',
                onNewChat: function() {
                    // 新建对话
                    chatHistoryManager.close();
                    showWelcome();
                    document.getElementById('chatMessages').innerHTML = '';
                    document.getElementById('welcomeBox').style.display = 'block';
                    currentSessionId = null;
                    currentChat = null;
                },
                onLoadChat: function(chat) {
                    loadSession(chat);
                }
            });
        });

        function loadSession(session) {
            chatHistoryManager.close();
            // 保存当前会话信息
            currentSessionId = session.session_id || session.id;
            currentChat = session;

            document.getElementById('welcomeBox').style.display = 'none';
            document.getElementById('noSessionMsg').style.display = 'none';
            document.getElementById('chatMessages').innerHTML = '';

            // 如果是 chat_agent 的多轮会话
            if (session.page === 'chat_agent' && session.session_id) {
                // 如果已经有 messages 数据（从 loadChatDetail 预取的），直接使用
                if (session.messages && session.messages.length > 0) {
                    document.getElementById('chatTitle').textContent = '会话已加载';
                    session.messages.forEach(msg => {
                        addMessage(msg.role, msg.content, msg.action_type, msg.diff_content);
                    });
                    scrollToBottom();
                } else {
                    // 否则调用 API 获取消息
                    document.getElementById('chatTitle').textContent = '加载中...';
                    fetch('/api/chat/history/' + session.session_id)
                    .then(r => r.json())
                    .then(data => {
                        if (data.success && data.data.messages && data.data.messages.length > 0) {
                            document.getElementById('chatTitle').textContent = '会话已加载';
                            data.data.messages.forEach(msg => {
                                addMessage(msg.role, msg.content, msg.action_type, msg.diff_content);
                            });
                        } else {
                            document.getElementById('noSessionMsg').style.display = 'block';
                            document.getElementById('chatTitle').textContent = '新对话';
                        }
                        scrollToBottom();
                    })
                    .catch(() => {
                        document.getElementById('noSessionMsg').style.display = 'block';
                        scrollToBottom();
                    });
                }
            } else {
                // 非 chat_agent 页面，直接显示单条记录
                document.getElementById('chatTitle').textContent = pageNames[session.page] || '对话历史';
                // 用户消息
                if (session.user_input) {
                    addMessage('user', session.user_input);
                }
                // AI 响应
                if (session.ai_response) {
                    addMessage('assistant', session.ai_response);
                }
                scrollToBottom();
            }
        }

        function showWelcome() {
            document.getElementById('welcomeBox').style.display = 'block';
            document.getElementById('noSessionMsg').style.display = 'none';
            document.getElementById('chatTitle').textContent = '智能物流助手';
            currentSessionId = null;
        }

        function addMessage(role, content, actionType, diffContent) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'message ' + role;

            let extra = '';
            if (role === 'assistant' && actionType === 'mutation' && diffContent) {
                try {
                    const diff = JSON.parse(diffContent);
                    if (diff.before && diff.after) {
                        extra = '<div class="executed-badge">✓ 已执行变更</div>';
                    }
                } catch(e) {}
            }

            div.innerHTML = '<div class="message-content">' + escapeHtml(content).replace(/\n/g, '<br>') + extra + '</div>';
            container.appendChild(div);
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            // 如果当前不是 chat_agent 会话，创建新会话
            if (!currentSessionId || currentSessionId.startsWith('single_')) {
                fetch('/api/chat_history/sessions', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({title: message.substring(0, 30)})
                })
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        const newSessionId = data.data.session_id;
                        currentSessionId = newSessionId;
                        sendMessageReal(newSessionId, message);
                    }
                });
                input.value = '';
                return;
            }

            sendMessageReal(currentSessionId, message);
            input.value = '';
        }

        function sendMessageReal(sessionId, message) {
            addMessage('user', message);
            scrollToBottom();

            fetch('/api/chat/send', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({session_id: sessionId, message: message})
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    const result = data.data;
                    addMessage('assistant', result.content, result.type);

                    if (result.need_confirm && result.action_plan) {
                        pendingPlan = result.action_plan;
                        showIntentConfirm(result.action_plan);
                    }
                    scrollToBottom();
                } else {
                    addMessage('assistant', '抱歉，处理失败: ' + data.message);
                    scrollToBottom();
                }
            })
            .catch(err => {
                addMessage('assistant', '网络错误，请稍后重试');
                scrollToBottom();
            });
        }

        function showIntentConfirm(plan) {
            const body = document.getElementById('confirmModalBody');
            body.innerHTML = '<p>' + (plan.description || '确认执行此操作？') + '</p><p class="text-muted">将影响 ' + plan.affected_count + ' 条记录</p>';

            document.getElementById('confirmBtn').onclick = () => {
                bootstrap.Modal.getInstance(document.getElementById('confirmModal')).hide();
                confirmIntent();
            };

            new bootstrap.Modal(document.getElementById('confirmModal')).show();
        }

        function confirmIntent() {
            fetch('/api/chat/confirm', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    session_id: currentSessionId,
                    step: 'intent',
                    confirmed: true,
                    plan: pendingPlan
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.data.need_diff_confirm) {
                    showDiffConfirm(data.data.diff);
                } else if (data.success) {
                    addMessage('assistant', data.data.content || '操作完成');
                    loadSession(currentSessionId);
                } else {
                    addMessage('assistant', data.message || '操作已取消');
                }
                scrollToBottom();
            });
        }

        function showDiffConfirm(diff) {
            const before = diff.before || [];
            const after = diff.after || [];

            let tableHtml = '<table class="table table-sm"><thead><tr><th>订单ID</th><th>原状态</th><th>新状态</th></tr></thead><tbody>';

            for (let i = 0; i < before.length; i++) {
                tableHtml += '<tr><td>' + escapeHtml(before[i].id) + '</td><td>' + escapeHtml(before[i].status) + '</td><td class="text-success">' + escapeHtml(after[i]?.status || '') + '</td></tr>';
            }

            tableHtml += '</tbody></table>';

            document.getElementById('diffModalBody').innerHTML = tableHtml;

            document.getElementById('diffConfirmBtn').onclick = () => {
                bootstrap.Modal.getInstance(document.getElementById('diffModal')).hide();
                confirmDiff();
            };

            new bootstrap.Modal(document.getElementById('diffModal')).show();
        }

        function confirmDiff() {
            fetch('/api/chat/confirm', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    session_id: currentSessionId,
                    step: 'diff',
                    confirmed: true,
                    plan: pendingPlan
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    addMessage('assistant', data.data.message || '操作执行成功');
                    pendingPlan = null;
                    loadSession(currentSessionId);
                } else {
                    addMessage('assistant', '操作失败: ' + data.message);
                }
                scrollToBottom();
            });
        }

        function scrollToBottom() {
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
