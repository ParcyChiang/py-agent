<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据导入 - 物流智能分析</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="user-header">
        <span class="user-info"><span id="currentUser"></span></span>
        <a class="btn-logout" href="/logout">退出</a>
    </div>
    <script src="{{ url_for('static', filename='liquid-glass.js') }}"></script>
    <script src="{{ url_for('static', filename='user_header.js') }}"></script>
    <div class="container">
        <header>
            <h1>数据导入</h1>
            <p>上传CSV，系统将覆盖旧数据。</p>
        </header>

        <nav class="nav">
            <a href="/">首页</a>
            <a class="secondary" href="/page/upload">数据导入</a>
            <a class="secondary" href="/page/analyze">运营分析</a>
            <a class="secondary" href="/page/report">日报中心</a>
            <a class="secondary" href="/page/analysis_report">运营报告</a>
            <a class="secondary" href="/page/new_dashboard">实时监控</a>
            <a class="secondary" href="/page/code_generator">代码生成器</a>
            <a class="secondary" href="/page/compare">物流对比</a>
        </nav>

        <div class="import-section" style="display:flex;justify-content:flex-end;align-items:flex-start;flex-wrap:wrap;gap:12px;">
            <div class="file-input" style="display:none;">
                <input type="file" id="file" name="file" accept=".csv" required>
            </div>
            <div style="display:flex;gap:12px;">
                <button type="button" id="uploadBtn" style="padding:8px 16px;background:rgba(60,140,100,0.8);color:#fff;border-radius:4px;border:1px solid rgba(100,220,150,0.4);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.3s ease;">上传并导入数据</button>
                <button type="button" id="deleteCsvBtn" style="padding:8px 16px;background:rgba(200,60,60,0.8);color:#fff;border-radius:4px;border:1px solid rgba(255,100,100,0.4);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.3s ease;">删除CSV数据</button>
            </div>
        </div>

        <div id="uploadResult" style="margin-top:12px;color:#fff;"></div>

        <div id="shipmentsTip" style="margin-top:12px;color:#fff;"></div>
        <div id="shipmentsList" style="margin-top:16px;"></div>
        <div class="table-pagination" id="tablePagination"></div>
    </div>

    <style>
        .table-pagination {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        .pagination-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 5px 10px;
            margin: 0 5px;
            cursor: pointer;
            border-radius: 4px;
            color: #fff;
        }
        .pagination-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        .pagination-btn.active {
            background: rgba(22, 93, 255, 0.8);
            color: white;
        }
        .pagination-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .total-info {
            color: rgba(255, 255, 255, 0.8);
        }
        .page-buttons {
            display: flex;
            gap: 4px;
        }
        .jump-to-page {
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.8);
        }
        #shipmentsList table {
            width: 100%;
            border-collapse: collapse;
        }
        #shipmentsList th, #shipmentsList td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        #shipmentsList th {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        var currentPage = 1;
        var pageSize = 10;
        var total = 0;

        function loadShipments(page) {
            if (page) currentPage = page;
            $('#shipmentsTip').html('加载中...');
            $('#shipmentsList').html('');
            $('#tablePagination').html('');

            $.getJSON('/shipments?page=' + currentPage + '&pageSize=' + pageSize, function(response) {
                if (response.success && response.data.length > 0) {
                    total = response.total || response.data.length;
                    var html = '<table><tr><th>ID</th><th>起始地</th><th>目的地</th><th>状态</th><th>重量 (kg)</th></tr>';
                    response.data.forEach(function(shipment){
                        html += '<tr>'+
                            '<td>'+shipment.id+'</td>'+
                            '<td>'+shipment.origin+'</td>'+
                            '<td>'+shipment.destination+'</td>'+
                            '<td>'+shipment.status+'</td>'+
                            '<td>'+shipment.weight+'</td>'+
                        '</tr>';
                    });
                    html += '</table>';
                    $('#shipmentsList').html(html);
                    $('#shipmentsTip').html('');
                    renderPagination();
                } else {
                    $('#shipmentsTip').html('<div style="padding:10px;background:rgba(255,255,255,0.1);border-radius:4px;">暂无数据，请上传CSV文件</div>');
                    $('#shipmentsList').html('');
                }
            }).fail(function(){
                $('#shipmentsTip').html('<div style="padding:10px;background:rgba(255,100,100,0.2);border-radius:4px;">加载失败，请重试</div>');
                $('#shipmentsList').html('');
            });
        }

        function renderPagination() {
            var pagination = $('#tablePagination');
            pagination.html('');

            var totalPages = Math.ceil(total / pageSize);
            if (totalPages <= 1) return;

            var paginationContainer = $('<div class="pagination-container"></div>');

            // 左侧：总记录数
            var totalInfo = $('<div class="total-info">共 ' + total + ' 条记录</div>');
            paginationContainer.append(totalInfo);

            // 中间：页码按钮
            var pageButtons = $('<div class="page-buttons"></div>');

            // 计算显示的页码范围
            var startPage = Math.max(1, currentPage - 2);
            var endPage = Math.min(totalPages, startPage + 5);
            if (endPage - startPage < 5) {
                startPage = Math.max(1, endPage - 5);
            }

            // 上一页按钮
            if (currentPage > 1) {
                var prevBtn = $('<button class="pagination-btn">上一页</button>');
                prevBtn.on('click', function() {
                    currentPage = Math.max(1, currentPage - 1);
                    loadShipments();
                });
                pageButtons.append(prevBtn);
            }

            // 页码按钮
            for (var i = startPage; i <= endPage; i++) {
                var btn = $('<button class="pagination-btn ' + (i === currentPage ? 'active' : '') + '">' + i + '</button>');
                btn.on('click', function() {
                    currentPage = parseInt($(this).text());
                    loadShipments();
                });
                pageButtons.append(btn);
            }

            // 下一页按钮
            if (currentPage < totalPages) {
                var nextBtn = $('<button class="pagination-btn">下一页</button>');
                nextBtn.on('click', function() {
                    currentPage = Math.min(totalPages, currentPage + 1);
                    loadShipments();
                });
                pageButtons.append(nextBtn);
            }

            paginationContainer.append(pageButtons);

            // 右侧：跳转到指定页
            var jumpToPage = $('<div class="jump-to-page"></div>');
            jumpToPage.html('前往第 <input type="number" id="jumpPageInput" min="1" max="' + totalPages + '" value="' + currentPage + '" style="width: 60px; margin: 0 5px; padding: 2px 4px; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; background: rgba(255,255,255,0.1); color: #fff;"> 页 <button id="jumpPageBtn" class="pagination-btn" style="margin-left: 5px;">确定</button>');
            paginationContainer.append(jumpToPage);

            pagination.append(paginationContainer);

            // 添加跳转按钮事件
            $('#jumpPageBtn').on('click', function() {
                var jumpPage = parseInt($('#jumpPageInput').val());
                if (jumpPage >= 1 && jumpPage <= totalPages) {
                    currentPage = jumpPage;
                    loadShipments();
                }
            });

            // 添加回车键事件
            $('#jumpPageInput').on('keypress', function(e) {
                if (e.key === 'Enter') {
                    $('#jumpPageBtn').click();
                }
            });
        }

        $(function(){
            // 页面加载时自动检查并展示数据
            loadShipments();

            // 点击上传按钮触发文件选择
            $('#uploadBtn').on('click', function(){
                $('#file').click();
            });

            // 文件选择后自动上传
            $('#file').on('change', function(){
                var fileName = $(this).val().split('\\').pop();
                if (fileName) {
                    $('#uploadResult').html('<div class="success">已选择文件: ' + fileName + '，正在上传...</div>');
                    var formData = new FormData();
                    formData.append('file', this.files[0]);
                    $.ajax({
                        url: '/upload',
                        type: 'POST',
                        data: formData,
                        processData: false,
                        contentType: false,
                        success: function(response) {
                            if (response.success) {
                                $('#uploadResult').html('<div class="success">'+response.message+'</div><p>导入记录数: '+response.count+'</p>');
                                loadShipments();
                            } else {
                                $('#uploadResult').html('<div class="error">'+response.message+'</div>');
                            }
                        },
                        error: function() {
                            $('#uploadResult').html('<div class="error">上传失败，请重试</div>');
                        }
                    });
                }
            });

            $('#deleteCsvBtn').on('click', function(){
                if(!confirm('确定要删除所有已导入的CSV数据吗？此操作不可恢复。')) return;
                $.ajax({
                    url: '/delete_csv',
                    type: 'POST',
                    success: function(response){
                        if(response.success){
                            $('#uploadResult').html('<div class="success">'+response.message+'</div>');
                            $('#shipmentsTip').html('<div style="padding:10px;background:rgba(255,255,255,0.1);border-radius:4px;">暂无数据，请上传CSV文件</div>');
                            $('#shipmentsList').html('');
                        } else {
                            $('#uploadResult').html('<div class="error">'+response.message+'</div>');
                        }
                    },
                    error: function(){
                        $('#uploadResult').html('<div class="error">删除失败，请重试</div>');
                    }
                });
            });
        });
    </script>
</body>
</html>
