<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流数据动态看板</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pages/new_dashboard.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
</head>
<body>
    <div class="user-header">
        <span class="user-info">
            <span id="currentUser"></span>
        </span>
        <a class="btn-logout" href="/logout">退出</a>
    </div>

    <div class="container">
        <header>
            <h1>实时监控仪表板</h1>
            <p>实时监控物流运营状态和关键指标，助力业务决策</p>
        </header>

        <nav class="nav">
            <div class="nav-links">
                <a href="/">首页</a>
                <a class="secondary" href="/page/upload">物流数据</a>
                <a class="secondary" href="/page/analyze">运营分析</a>
                <a class="secondary" href="/page/report">日报中心</a>
                <a class="secondary" href="/page/analysis_report">运营报告</a>
                <a class="secondary" href="/page/new_dashboard">实时监控</a>
                <a class="secondary" href="/page/code_generator">代码生成器</a>
                <a class="secondary" href="/page/compare">物流对比</a>
            </div>
        </nav>
    </div>

    <script src="{{ url_for('static', filename='js/liquid-glass.js') }}"></script>
    <script src="{{ url_for('static', filename='js/user_header.js') }}"></script>

    <div class="dashboard-container">
        <h1 class="text-center mb-4">物流数据动态看板</h1>
        
        <!-- 顶部动态图表 -->
        <div class="dashboard-header">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>实时数据趋势</h2>
                <div class="form-group">
                    <label for="timeGranularity">时间粒度：</label>
                    <select id="timeGranularity" class="form-control">
                        <option value="realtime">实时</option>
                        <option value="1min">1分钟</option>
                        <option value="5min">5分钟</option>
                    </select>
                </div>
            </div>
            <div class="chart-container" id="trendChart"></div>
            <div class="refresh-indicator" id="chartRefresh">最后更新：2026-02-24 12:00:00</div>
        </div>
        
        <!-- 中部指标卡片轮播 -->
        <div class="metrics-container">
            <h2 class="mb-3">关键指标</h2>
            <div class="metric-cards" id="metricCards">
                <!-- 指标卡片将通过JavaScript动态生成 -->
            </div>
            <div class="carousel-controls">
                <button class="carousel-control" id="prevCard">&lt;</button>
                <button class="carousel-control" id="nextCard">&gt;</button>
            </div>
            <div class="refresh-indicator" id="metricsRefresh">最后更新：2026-02-24 12:00:00</div>
        </div>
        
        <!-- 底部数据表格 -->
        <div class="table-container">
            <div class="table-controls">
                <h2>详细数据</h2>
                <div class="d-flex align-items-center">
                    <div class="form-group mr-3">
                        <label for="statusFilter">状态筛选：</label>
                        <select id="statusFilter" class="form-control">
                            <option value="all">全部</option>
                            <option value="已交付">已交付</option>
                            <option value="运输中">运输中</option>
                            <option value="待处理">待处理</option>
                            <option value="派件中">派件中</option>
                            <option value="已揽件">已揽件</option>
                            <option value="处理中">处理中</option>
                            <option value="配送失败">配送失败</option>
                            <option value="已退回">已退回</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="text" id="searchInput" class="form-control" placeholder="搜索订单号或企业名称">
                    </div>
                </div>
            </div>
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th data-sort="orderId">订单号</th>
                        <th data-sort="company">企业名称</th>
                        <th data-sort="status">状态</th>
                        <th data-sort="origin">始发地</th>
                        <th data-sort="destination">目的地</th>
                        <th data-sort="time">时间</th>
                        <th data-sort="value">价值</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- 表格数据将通过JavaScript动态生成 -->
                </tbody>
            </table>
            <div class="table-pagination" id="tablePagination">
                <!-- 分页按钮将通过JavaScript动态生成 -->
            </div>
            <div class="refresh-indicator" id="tableRefresh">最后更新：2026-02-24 12:00:00</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/pages/new_dashboard.js') }}"></script>
</body>
</html>
