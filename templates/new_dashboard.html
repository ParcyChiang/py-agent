<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流数据动态看板</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <style>
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
        }
        .dashboard-header {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        .chart-container {
            height: 400px;
            margin-bottom: 20px;
        }
        .metrics-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .metric-cards {
            display: flex;
            transition: transform 0.5s ease;
        }
        .metric-card {
            flex: 0 0 23%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 20px;
            margin: 0 1%;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        .metric-value {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
        .metric-trend {
            font-size: 14px;
            margin-top: 10px;
        }
        .trend-up {
            color: #28a745;
        }
        .trend-down {
            color: #dc3545;
        }
        .carousel-controls {
            position: absolute;
            top: 50%;
            width: 100%;
            transform: translateY(-50%);
            display: flex;
            justify-content: space-between;
            padding: 0 10px;
        }
        .carousel-control {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }
        .table-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            padding: 20px;
            margin-bottom: 20px;
        }
        .table-controls {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-pagination {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }
        .pagination-btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 5px 10px;
            margin: 0 5px;
            cursor: pointer;
            border-radius: 4px;
        }
        .pagination-btn.active {
            background: rgba(22, 93, 255, 0.8);
            color: white;
        }
        .refresh-indicator {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
        }
        .dashboard-container > h1 {
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
        .dashboard-container h2 {
            color: white;
        }
        .dashboard-container label {
            color: white;
        }
        .dashboard-container .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .dashboard-container .form-control option {
            background: #1a1a2e;
            color: white;
        }
        .dashboard-container .metric-card {
            color: white;
        }
        .dashboard-container .metric-name {
            color: rgba(255, 255, 255, 0.8);
        }
        .dashboard-container .metric-value {
            color: white;
        }
        .dashboard-container .badge {
            color: white;
        }
    </style>
</head>
<body>
    <script src="{{ url_for('static', filename='liquid-glass.js') }}"></script>
    <script src="{{ url_for('static', filename='user_header.js') }}"></script>
    <div class="user-header">
        <span class="user-info">
            <span id="currentUser"></span>
        </span>
        <a class="btn-logout" href="/logout">退出</a>
    </div>

    <div class="container">
        <header>
            <h1>实时监控仪表板</h1>
            <p>实时监控物流运营状态和关键指标，助力业务决策</p>
        </header>

        <nav class="nav">
            <div class="nav-links">
                <a href="/">首页</a>
                <a class="secondary" href="/page/upload">物流数据</a>
                <a class="secondary" href="/page/analyze">运营分析</a>
                <a class="secondary" href="/page/report">日报中心</a>
                <a class="secondary" href="/page/analysis_report">运营报告</a>
                <a class="secondary" href="/page/new_dashboard">实时监控</a>
                <a class="secondary" href="/page/code_generator">代码生成器</a>
                <a class="secondary" href="/page/compare">物流对比</a>
            </div>
        </nav>
    </div>

    <div class="dashboard-container">
        <h1 class="text-center mb-4">物流数据动态看板</h1>
        
        <!-- 顶部动态图表 -->
        <div class="dashboard-header">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2>实时数据趋势</h2>
                <div class="form-group">
                    <label for="timeGranularity">时间粒度：</label>
                    <select id="timeGranularity" class="form-control">
                        <option value="realtime">实时</option>
                        <option value="1min">1分钟</option>
                        <option value="5min">5分钟</option>
                    </select>
                </div>
            </div>
            <div class="chart-container" id="trendChart"></div>
            <div class="refresh-indicator" id="chartRefresh">最后更新：2026-02-24 12:00:00</div>
        </div>
        
        <!-- 中部指标卡片轮播 -->
        <div class="metrics-container">
            <h2 class="mb-3">关键指标</h2>
            <div class="metric-cards" id="metricCards">
                <!-- 指标卡片将通过JavaScript动态生成 -->
            </div>
            <div class="carousel-controls">
                <button class="carousel-control" id="prevCard">&lt;</button>
                <button class="carousel-control" id="nextCard">&gt;</button>
            </div>
            <div class="refresh-indicator" id="metricsRefresh">最后更新：2026-02-24 12:00:00</div>
        </div>
        
        <!-- 底部数据表格 -->
        <div class="table-container">
            <div class="table-controls">
                <h2>详细数据</h2>
                <div class="d-flex align-items-center">
                    <div class="form-group mr-3">
                        <label for="statusFilter">状态筛选：</label>
                        <select id="statusFilter" class="form-control">
                            <option value="all">全部</option>
                            <option value="已交付">已交付</option>
                            <option value="运输中">运输中</option>
                            <option value="待处理">待处理</option>
                            <option value="派件中">派件中</option>
                            <option value="已揽件">已揽件</option>
                            <option value="处理中">处理中</option>
                            <option value="配送失败">配送失败</option>
                            <option value="已退回">已退回</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="text" id="searchInput" class="form-control" placeholder="搜索订单号或企业名称">
                    </div>
                </div>
            </div>
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th data-sort="orderId">订单号</th>
                        <th data-sort="company">企业名称</th>
                        <th data-sort="status">状态</th>
                        <th data-sort="origin">始发地</th>
                        <th data-sort="destination">目的地</th>
                        <th data-sort="time">时间</th>
                        <th data-sort="value">价值</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- 表格数据将通过JavaScript动态生成 -->
                </tbody>
            </table>
            <div class="table-pagination" id="tablePagination">
                <!-- 分页按钮将通过JavaScript动态生成 -->
            </div>
            <div class="refresh-indicator" id="tableRefresh">最后更新：2026-02-24 12:00:00</div>
        </div>
    </div>
    </div>

    <script>
        // 全局变量
        let currentPage = 1;
        const pageSize = 10;
        let sortField = 'time';
        let sortDirection = 'desc';
        let currentCardIndex = 0;
        let totalCardGroups = 1;
        let chartInterval;
        let metricsInterval;
        let tableInterval;
        let timeGranularity = 'realtime';

        // 从API获取趋势数据
        const fetchTrendData = async () => {
            try {
                const response = await fetch(`/api/dashboard/trend?granularity=${timeGranularity}`);
                const result = await response.json();
                if (result.success) {
                    return result.data;
                } else {
                    console.error('获取趋势数据失败:', result.message);
                    return [];
                }
            } catch (error) {
                console.error('获取趋势数据出错:', error);
                return [];
            }
        };
        
        // 从API获取指标数据
        const fetchMetricsData = async () => {
            try {
                const response = await fetch('/api/dashboard/metrics');
                const result = await response.json();
                if (result.success) {
                    return result.data;
                } else {
                    console.error('获取指标数据失败:', result.message);
                    return [];
                }
            } catch (error) {
                console.error('获取指标数据出错:', error);
                return [];
            }
        };
        
        // 从API获取表格数据
        const fetchTableData = async () => {
            try {
                const statusFilter = document.getElementById('statusFilter').value;
                const searchTerm = document.getElementById('searchInput').value;
                
                const params = new URLSearchParams({
                    page: currentPage,
                    pageSize: pageSize,
                    status: statusFilter,
                    search: searchTerm,
                    sortField: sortField,
                    sortDirection: sortDirection
                });
                
                const response = await fetch(`/api/dashboard/table?${params}`);
                const result = await response.json();
                if (result.success) {
                    return result;
                } else {
                    console.error('获取表格数据失败:', result.message);
                    return { data: [], total: 0 };
                }
            } catch (error) {
                console.error('获取表格数据出错:', error);
                return { data: [], total: 0 };
            }
        };
        
        // 初始化图表
        const initChart = () => {
            const chartDom = document.getElementById('trendChart');
            const myChart = echarts.init(chartDom);

            const updateChart = async () => {
                const chartData = await fetchTrendData();

                if (chartData.length > 0) {
                    const option = {
                        title: {
                            text: '实时数据趋势',
                            left: 'center'
                        },
                        tooltip: {
                            trigger: 'axis'
                        },
                        xAxis: {
                            type: 'category',
                            data: chartData.map(d => d.time),
                            axisLine: {
                                lineStyle: {
                                    color: '#333'
                                }
                            },
                            axisLabel: {
                                color: '#333',
                                rotate: 45
                            }
                        },
                        yAxis: {
                            type: 'value',
                            axisLine: {
                                lineStyle: {
                                    color: '#333'
                                }
                            },
                            axisLabel: {
                                color: '#333'
                            }
                        },
                        series: [{
                            type: 'line',
                            data: chartData.map(d => d.value),
                            smooth: true,
                            areaStyle: {
                                opacity: 0.3
                            },
                            itemStyle: {
                                color: '#0d6efd'
                            }
                        }]
                    };

                    myChart.setOption(option);
                }

                document.getElementById('chartRefresh').textContent = '最后更新：' + new Date().toLocaleString();
            };

            updateChart();
            chartInterval = setInterval(updateChart, 1000);

            window.addEventListener('resize', () => {
                myChart.resize();
            });

            document.getElementById('timeGranularity').addEventListener('change', (e) => {
                timeGranularity = e.target.value;
                updateChart();
            });
        };

        // 初始化指标卡片
        const initMetrics = () => {
            const updateMetrics = async () => {
                const metrics = await fetchMetricsData();

                if (metrics.length > 0) {
                    const metricCardsContainer = document.getElementById('metricCards');
                    metricCardsContainer.innerHTML = '';

                    metrics.forEach(metric => {
                        const card = document.createElement('div');
                        card.className = 'metric-card';
                        card.innerHTML = `
                            <div class="metric-name">${metric.name}</div>
                            <div class="metric-value">${metric.value}</div>
                            <div class="metric-trend ${metric.trendUp ? 'trend-up' : 'trend-down'}">
                                ${metric.trendUp ? '↑' : '↓'} ${metric.trend}%
                            </div>
                        `;
                        metricCardsContainer.appendChild(card);
                    });

                    totalCardGroups = Math.ceil(metrics.length / 4);
                    if (totalCardGroups < 1) totalCardGroups = 1;
                    currentCardIndex = 0;
                }

                document.getElementById('metricsRefresh').textContent = '最后更新：' + new Date().toLocaleString();
            };

            updateMetrics();
            metricsInterval = setInterval(updateMetrics, 5000);

            document.getElementById('prevCard').addEventListener('click', () => {
                currentCardIndex = (currentCardIndex - 1 + totalCardGroups) % totalCardGroups;
                updateCardPosition();
            });

            document.getElementById('nextCard').addEventListener('click', () => {
                currentCardIndex = (currentCardIndex + 1) % totalCardGroups;
                updateCardPosition();
            });

            setInterval(() => {
                currentCardIndex = (currentCardIndex + 1) % totalCardGroups;
                updateCardPosition();
            }, 5000);
        };

        // 更新卡片位置
        const updateCardPosition = () => {
            const metricCardsContainer = document.getElementById('metricCards');
            metricCardsContainer.style.transform = `translateX(-${currentCardIndex * 100}%)`;
        };

        // 初始化数据表格
        const initTable = () => {
            const updateTable = async () => {
                await renderTable();
                document.getElementById('tableRefresh').textContent = '最后更新：' + new Date().toLocaleString();
            };
            
            updateTable();
            tableInterval = setInterval(updateTable, 10000);
            
            // 排序
            document.querySelectorAll('th[data-sort]').forEach(th => {
                th.addEventListener('click', () => {
                    const field = th.getAttribute('data-sort');
                    if (sortField === field) {
                        sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                    } else {
                        sortField = field;
                        sortDirection = 'asc';
                    }
                    currentPage = 1; // 重置到第一页
                    renderTable();
                });
            });
            
            // 筛选
            document.getElementById('statusFilter').addEventListener('change', () => {
                currentPage = 1; // 重置到第一页
                renderTable();
            });
            document.getElementById('searchInput').addEventListener('input', () => {
                currentPage = 1; // 重置到第一页
                renderTable();
            });
        };
        
        // 渲染表格
        const renderTable = async () => {
            const result = await fetchTableData();
            const tableData = result.data || [];
            const total = result.total || 0;
            
            // 渲染表格数据
            const tableBody = document.getElementById('dataTableBody');
            tableBody.innerHTML = '';
            
            if (tableData.length === 0) {
                const row = document.createElement('tr');
                row.innerHTML = `<td colspan="7" class="text-center">暂无数据</td>`;
                tableBody.appendChild(row);
            } else {
                tableData.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.orderId}</td>
                        <td>${item.company}</td>
                        <td>
                            <span class="badge ${item.status === '已交付' ? 'bg-success' : item.status === '运输中' ? 'bg-warning' : 'bg-secondary'}">
                                ${item.status}
                            </span>
                        </td>
                        <td>${item.origin}</td>
                        <td>${item.destination}</td>
                        <td>${item.time}</td>
                        <td>¥${item.value}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }
            
            // 渲染分页
            const pagination = document.getElementById('tablePagination');
            pagination.innerHTML = '';
            
            const totalPages = Math.ceil(total / pageSize);
            if (totalPages > 0) {
                // 分页容器
                const paginationContainer = document.createElement('div');
                paginationContainer.className = 'd-flex justify-content-between align-items-center w-100';
                
                // 左侧：总记录数
                const totalInfo = document.createElement('div');
                totalInfo.className = 'total-info';
                totalInfo.textContent = `共 ${total} 条记录`;
                paginationContainer.appendChild(totalInfo);
                
                // 中间：页码按钮
                const pageButtons = document.createElement('div');
                pageButtons.className = 'page-buttons';
                
                // 计算显示的页码范围
                let startPage = Math.max(1, currentPage - 2);
                let endPage = Math.min(totalPages, startPage + 5);
                
                // 调整起始页码，确保显示6个页码
                if (endPage - startPage < 5) {
                    startPage = Math.max(1, endPage - 5);
                }
                
                // 上一页按钮
                if (currentPage > 1) {
                    const prevBtn = document.createElement('button');
                    prevBtn.className = 'pagination-btn';
                    prevBtn.textContent = '上一页';
                    prevBtn.addEventListener('click', () => {
                        currentPage = Math.max(1, currentPage - 1);
                        renderTable();
                    });
                    pageButtons.appendChild(prevBtn);
                }
                
                // 页码按钮
                for (let i = startPage; i <= endPage; i++) {
                    const btn = document.createElement('button');
                    btn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
                    btn.textContent = i;
                    btn.addEventListener('click', () => {
                        currentPage = i;
                        renderTable();
                    });
                    pageButtons.appendChild(btn);
                }
                
                // 下一页按钮
                if (currentPage < totalPages) {
                    const nextBtn = document.createElement('button');
                    nextBtn.className = 'pagination-btn';
                    nextBtn.textContent = '下一页';
                    nextBtn.addEventListener('click', () => {
                        currentPage = Math.min(totalPages, currentPage + 1);
                        renderTable();
                    });
                    pageButtons.appendChild(nextBtn);
                }
                
                paginationContainer.appendChild(pageButtons);
                
                // 右侧：跳转到指定页
                const jumpToPage = document.createElement('div');
                jumpToPage.className = 'jump-to-page';
                jumpToPage.innerHTML = `
                    <span>前往第</span>
                    <input type="number" id="jumpPageInput" min="1" max="${totalPages}" value="${currentPage}" style="width: 60px; margin: 0 5px; padding: 2px 4px; border: 1px solid #dee2e6; border-radius: 4px;">
                    <span>页</span>
                    <button id="jumpPageBtn" class="pagination-btn" style="margin-left: 5px;">确定</button>
                `;
                paginationContainer.appendChild(jumpToPage);
                
                pagination.appendChild(paginationContainer);
                
                // 添加跳转按钮事件
                document.getElementById('jumpPageBtn').addEventListener('click', () => {
                    const jumpPage = parseInt(document.getElementById('jumpPageInput').value);
                    if (jumpPage >= 1 && jumpPage <= totalPages) {
                        currentPage = jumpPage;
                        renderTable();
                    }
                });
                
                // 添加回车键事件
                document.getElementById('jumpPageInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        document.getElementById('jumpPageBtn').click();
                    }
                });
            }
        };
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            initMetrics();
            initTable();
        });
        
        // 清理定时器
        window.addEventListener('beforeunload', () => {
            clearInterval(chartInterval);
            clearInterval(metricsInterval);
            clearInterval(tableInterval);
        });
    </script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
